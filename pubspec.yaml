name: comms
description: "Comms - Stay connected with your people"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5

  # Google Sign-In
  google_sign_in: ^6.2.2

  # WebRTC for audio/video calls
  flutter_webrtc: ^0.12.8

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^18.0.0
  flutter_ringtone_player: ^4.0.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  package_info_plus: ^10.2.0
  dio: ^5.10.0
  url_launcher: ^6.3.2
  http: ^1.2.2
  googleapis_auth: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
